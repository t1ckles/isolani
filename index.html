<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APHELION — Deep Survey Terminal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="layout">

    <div id="terminal">

      <div id="terminal-header">
        <span class="title">A P H E L I O N</span>
        <span class="version">v0.1.0-dev</span>
      </div>

      <div id="terminal-subheader">
        Deep Survey Terminal — Veydrite Assayer's Guild Network
      </div>

      <div id="terminal-divider"></div>

      <div id="terminal-body">
        <div id="output"></div>
        <div id="input-line">
          <span class="prompt">&gt;&nbsp;</span>
          <span id="typed"></span>
          <span class="cursor">█</span>
        </div>
      </div>

    </div>

    <div id="sidebar">

      <div class="sidebar-section">
        <div class="sidebar-label">VESSEL</div>
        <div id="sb-captain" class="sidebar-value">—</div>
        <div id="sb-ship" class="sidebar-dim">—</div>
        <div id="sb-day" class="sidebar-dim">Day 0</div>
      </div>

      <div class="sidebar-divider"></div>

      <div class="sidebar-section">
        <div class="sidebar-label">SYSTEMS</div>
        <div class="sidebar-row">
          <span class="sidebar-dim">Hull</span>
          <span id="sb-hull-bar" class="sidebar-bar">██████████</span>
        </div>
        <div class="sidebar-row">
          <span class="sidebar-dim">Fuel</span>
          <span id="sb-fuel-bar" class="sidebar-bar">██████████</span>
        </div>
      </div>

      <div class="sidebar-divider"></div>

      <div class="sidebar-section">
        <div class="sidebar-label">CARGO</div>
        <div class="sidebar-row">
          <span class="sidebar-dim">Scrip</span>
          <span id="sb-credits" class="sidebar-value">0 CR</span>
        </div>
        <div class="sidebar-row">
          <span class="sidebar-dim">Veyd</span>
          <span id="sb-veydrite" class="sidebar-value">0 kg</span>
        </div>
      </div>

      <div class="sidebar-divider"></div>

      <div class="sidebar-section">
        <div class="sidebar-label">LOCATION</div>
        <div id="sb-system" class="sidebar-value">—</div>
        <div id="sb-cluster" class="sidebar-dim">—</div>
        <div id="sb-quadrant" class="sidebar-dim">—</div>
        <div id="sb-state" class="sidebar-status">—</div>
        <div id="sb-docked" class="sidebar-dim"></div>
      </div>

      <div class="sidebar-divider"></div>

      <div class="sidebar-section">
        <div class="sidebar-label">CONTRACT</div>
        <div id="sb-contract" class="sidebar-dim">none active</div>
      </div>

      <div class="sidebar-divider"></div>

      <div class="sidebar-section">
        <div class="sidebar-label">STANDING</div>
        <div id="sb-rep" class="sidebar-dim">no contacts</div>
      </div>

    </div>

  </div>

  <script src="js/rng.js"></script>
  <script src="js/naming.js"></script>
  <script src="js/galaxy.js"></script>
  <script src="js/economy.js"></script>
  <script src="js/factions.js"></script>
  <script src="js/commands.js"></script>
  <script src="js/main.js"></script>

</body>
</html>
